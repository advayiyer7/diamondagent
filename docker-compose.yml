services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: diamond-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: diamond
      POSTGRES_PASSWORD: diamond
      POSTGRES_DB: diamond_agent
    ports:
      - "5432:5432"
    volumes:
      - diamond_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diamond -d diamond_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  diamond_agent_pgdata:
